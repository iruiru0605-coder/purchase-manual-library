<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">取説ライブラリ</title>
  <desc id="desc">購入履歴CSVからAIが商品情報と取扱説明書PDF候補を探し、Google Driveへ保存してスマホで閲覧する流れ。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#edf6f5"/>
      <stop offset="1" stop-color="#f7f4ec"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="132%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#18333a" flood-opacity="0.15"/>
    </filter>
    <style>
      .title { font: 800 56px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #15323a; }
      .lead { font: 600 25px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #355963; }
      .label { font: 800 25px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17343b; }
      .body { font: 600 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526c74; }
      .tiny { font: 700 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #627980; }
      .card { fill: #fff; stroke: #d7e3e4; stroke-width: 2; filter: url(#shadow); }
      .teal { fill: #27827b; }
      .gold { fill: #d79843; }
      .red { fill: #ca695b; }
      .line { stroke: #5b958d; stroke-width: 5; stroke-linecap: round; fill: none; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="72" y="92" class="title">取説ライブラリ</text>
  <text x="75" y="136" class="lead">購入履歴から、取扱説明書PDFと紙マニュアルの場所を自動で整理するローカルWebアプリ</text>

  <rect x="82" y="218" width="250" height="210" rx="18" class="card"/>
  <circle cx="126" cy="268" r="26" class="teal"/>
  <path d="M112 268h28M126 254v28" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
  <text x="166" y="276" class="label">購入履歴CSV</text>
  <text x="112" y="330" class="body">Amazon / 楽天 / メルカリ</text>
  <text x="112" y="362" class="body">登録候補を自動作成</text>

  <rect x="475" y="188" width="250" height="270" rx="18" class="card"/>
  <circle cx="520" cy="244" r="26" class="gold"/>
  <text x="555" y="252" class="label">AI補完</text>
  <text x="506" y="310" class="body">メーカー</text>
  <text x="506" y="342" class="body">型番</text>
  <text x="506" y="374" class="body">カテゴリ</text>
  <text x="506" y="406" class="body">公式PDF候補</text>

  <rect x="868" y="218" width="250" height="210" rx="18" class="card"/>
  <circle cx="912" cy="268" r="26" class="red"/>
  <path d="M902 260h20v28h-20z" fill="#fff"/>
  <path d="M906 267h12M906 274h12M906 281h9" stroke="#ca695b" stroke-width="2"/>
  <text x="950" y="276" class="label">保存・閲覧</text>
  <text x="898" y="330" class="body">Google DriveへPDF保存</text>
  <text x="898" y="362" class="body">スマホで検索</text>

  <path d="M334 323h118M728 323h116" class="line"/>
  <path d="M438 309l20 14-20 14" class="line"/>
  <path d="M830 309l20 14-20 14" class="line"/>

  <rect x="188" y="494" width="250" height="64" rx="14" fill="#fff" stroke="#d7e3e4" stroke-width="2"/>
  <text x="224" y="534" class="body">登録する商品をチェック</text>
  <rect x="475" y="494" width="250" height="64" rx="14" fill="#fff" stroke="#d7e3e4" stroke-width="2"/>
  <text x="526" y="534" class="body">複数PDFを確認</text>
  <rect x="762" y="494" width="250" height="64" rx="14" fill="#fff" stroke="#d7e3e4" stroke-width="2"/>
  <text x="794" y="534" class="body">紙の保管先も記録</text>

  <text x="78" y="600" class="tiny">Local Web App / OpenAI互換API / Google Drive OAuth</text>
</svg>
